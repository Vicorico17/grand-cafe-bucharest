<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Full food and drinks menu for Grand Cafe Bucharest."
    >
    <title>Menu | Grand Cafe Bucharest</title>
    <link rel="canonical" href="https://grandcafe.ro/menu/">
    <meta property="og:url" content="https://grandcafe.ro/menu/">
    <meta property="og:title" content="Menu | Grand Cafe Bucharest">
    <meta property="og:description" content="Full food and drinks menu for Grand Cafe Bucharest.">
    <style>
      :root {
        --ink: #171412;
        --paper: #f7f4ee;
        --white: #fffdf8;
        --line: #d8d0c3;
        --ruby: #7d1232;
        --brass: #b18a4a;
        --charcoal: #24201d;
        --muted: #6d645c;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 8%, rgba(177, 138, 74, .12), transparent 26%),
          linear-gradient(180deg, var(--white), var(--paper));
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      .menu-header {
        position: sticky;
        z-index: 5;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px clamp(18px, 5vw, 64px);
        color: var(--white);
        background: rgba(23, 20, 18, .92);
        border-bottom: 1px solid rgba(255, 253, 248, .14);
        backdrop-filter: blur(14px);
      }

      .brand {
        text-decoration: none;
        text-transform: uppercase;
        line-height: 1.05;
      }

      .brand span {
        display: block;
        font-size: .74rem;
      }

      .brand strong {
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.1rem, 3vw, 1.55rem);
        font-weight: 500;
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border: 1px solid currentColor;
        border-radius: 8px;
        font-size: .78rem;
        font-weight: 800;
        text-decoration: none;
        text-transform: uppercase;
      }

      .button.primary {
        color: var(--white);
        background: var(--ruby);
        border-color: var(--ruby);
      }

      .page-title {
        padding: clamp(74px, 10vw, 120px) clamp(18px, 7vw, 96px) clamp(30px, 5vw, 58px);
        color: var(--white);
        background:
          linear-gradient(90deg, rgba(23, 20, 18, .92), rgba(23, 20, 18, .62)),
          url("https://commons.wikimedia.org/wiki/Special:Redirect/file/Cafe%20croissant.jpg?width=1400") center / cover;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--brass);
        font-size: .78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        overflow-wrap: anywhere;
      }

      h1,
      h2,
      h3 {
        overflow-wrap: normal;
        text-wrap: balance;
      }

      h1,
      h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 500;
        line-height: .98;
      }

      h1 {
        max-width: 10ch;
        font-size: clamp(3.4rem, 10vw, 7.4rem);
      }

      .page-title p:not(.eyebrow) {
        max-width: 680px;
        margin: 24px 0 0;
        color: rgba(255, 253, 248, .78);
        font-size: clamp(1rem, 2vw, 1.25rem);
      }

      .jump-nav {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 14px clamp(18px, 7vw, 96px);
        background: var(--charcoal);
        color: var(--white);
        scrollbar-width: thin;
      }

      .jump-nav a {
        flex: 0 0 auto;
        padding: 8px 11px;
        border: 1px solid rgba(255, 253, 248, .18);
        border-radius: 999px;
        color: rgba(255, 253, 248, .82);
        font-size: .72rem;
        font-weight: 800;
        text-decoration: none;
        text-transform: uppercase;
      }

      .menu-shell {
        display: grid;
        gap: clamp(34px, 6vw, 76px);
        padding: clamp(34px, 7vw, 86px) clamp(18px, 7vw, 96px);
      }

      .menu-group {
        display: grid;
        gap: 22px;
      }

      .menu-group h2 {
        color: var(--ruby);
        font-size: clamp(2.2rem, 5vw, 4.6rem);
      }

      .section-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .menu-section {
        padding: clamp(20px, 3vw, 32px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, .72);
      }

      .menu-section h3 {
        margin: 0 0 16px;
        color: var(--brass);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.35rem, 2vw, 1.9rem);
        font-weight: 600;
        text-transform: uppercase;
      }

      .dish {
        padding: 14px 0;
        border-top: 1px solid rgba(216, 208, 195, .72);
      }

      .dish:first-of-type {
        border-top: 0;
      }

      .dish-line {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: baseline;
      }

      .dish-name {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.08rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .weight {
        color: var(--muted);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: .82rem;
        font-weight: 500;
      }

      .price {
        color: var(--ruby);
        font-weight: 850;
        white-space: nowrap;
      }

      .description,
      .ingredients {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: .92rem;
      }

      .ingredients {
        color: #4f463f;
        font-style: italic;
      }

      @media (max-width: 860px) {
        .menu-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .header-actions {
          justify-content: flex-start;
        }

        .section-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 520px) {
        .header-actions .button {
          width: 100%;
        }

        .header-actions {
          width: 100%;
        }

        .dish-line {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .price {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <header class="menu-header">
      <a class="brand" href="/" aria-label="Grand Cafe Bucharest home">
        <span>Grand Cafe</span>
        <strong>Bucharest</strong>
      </a>
      <div class="header-actions">
        <a class="button" href="/">Back to site</a>
        <a class="button primary" href="/menu/grand-cafe-bucharest-menu.pdf" target="_blank" rel="noopener">
          Smooth PDF
        </a>
        <a class="button" href="/menu/grand-cafe-bucharest-menu-styled.pdf" target="_blank" rel="noopener">
          Styled PDF
        </a>
      </div>
    </header>

    <main>
      <section class="page-title">
        <p class="eyebrow">Full Menu</p>
        <h1>Grand Cafe Bucharest</h1>
        <p>All day dining, cocktails, coffee, wine, spirits, and soft drinks.</p>
      </section>

      <nav class="jump-nav" id="jump-nav" aria-label="Menu sections"></nav>
      <div class="menu-shell" id="menu-root" aria-live="polite"></div>
    </main>

    <script>
      const root = document.querySelector("#menu-root");
      const jumpNav = document.querySelector("#jump-nav");
      const formatter = new Intl.Collator("en");

      const slugify = (value) =>
        value
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");

      const createDish = (item) => {
        const article = document.createElement("article");
        article.className = "dish";

        const line = document.createElement("div");
        line.className = "dish-line";

        const name = document.createElement("p");
        name.className = "dish-name";
        name.textContent = item.weight ? `${item.name} ` : item.name;

        if (item.weight) {
          const weight = document.createElement("span");
          weight.className = "weight";
          weight.textContent = item.weight;
          name.append(weight);
        }

        const price = document.createElement("strong");
        price.className = "price";
        price.textContent = item.price ? `${item.price} lei` : "";

        line.append(name, price);
        article.append(line);

        if (item.description) {
          const description = document.createElement("p");
          description.className = "description";
          description.textContent = item.description;
          article.append(description);
        }

        if (item.ingredients) {
          const ingredients = document.createElement("p");
          ingredients.className = "ingredients";
          ingredients.textContent = item.ingredients;
          article.append(ingredients);
        }

        return article;
      };

      const renderGroup = (title, sections) => {
        const group = document.createElement("section");
        group.className = "menu-group";
        group.id = slugify(title);

        const heading = document.createElement("h2");
        heading.textContent = title;

        const grid = document.createElement("div");
        grid.className = "section-grid";

        sections.forEach((section) => {
          const sectionNode = document.createElement("section");
          sectionNode.className = "menu-section";
          sectionNode.id = slugify(`${title}-${section.title}`);

          const sectionTitle = document.createElement("h3");
          sectionTitle.textContent = section.title;
          sectionNode.append(sectionTitle);

          section.items
            .slice()
            .sort((a, b) => formatter.compare(a.name, b.name))
            .forEach((item) => sectionNode.append(createDish(item)));

          grid.append(sectionNode);
        });

        group.append(heading, grid);
        return group;
      };

      fetch("/menu/menu-data.json")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Menu data failed to load");
          }
          return response.json();
        })
        .then((data) => {
          const groups = [
            ["Food", data.food],
            ["Drinks", data.drinks],
          ];

          groups.forEach(([title, sections]) => {
            const link = document.createElement("a");
            link.href = `#${slugify(title)}`;
            link.textContent = title;
            jumpNav.append(link);

            sections.forEach((section) => {
              const sectionLink = document.createElement("a");
              sectionLink.href = `#${slugify(`${title}-${section.title}`)}`;
              sectionLink.textContent = section.title;
              jumpNav.append(sectionLink);
            });

            root.append(renderGroup(title, sections));
          });
        })
        .catch(() => {
          root.innerHTML = "<p>The menu could not be loaded. Please use the PDF link above.</p>";
        });
    </script>
  </body>
</html>
